<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DoisLados — Notícias do Brasil sem viés</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&display=swap" rel="stylesheet">
<style>
:root {
  --green:  #3ecf72; --green-p: #b8f5d0; --green-d: #1a7a3a;
  --yellow: #ffe066; --yellow-p: #fff5b8; --yellow-d: #b89000;
  --blue:   #4a7fd4; --blue-p: #c2d9ff;  --blue-d: #1a4a9a;
  --dark:   #0d1f0f; --ink: #12200e;
  --card-bg: rgba(255,255,255,0.72);
  --card-border: rgba(255,255,255,0.9);
  --muted: #4a5e42;
  --radius: 18px; --radius-lg: 28px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
  background:
    radial-gradient(ellipse 120% 80% at 10% 0%, #c8f5d8 0%, transparent 55%),
    radial-gradient(ellipse 100% 70% at 90% 10%, #fff5b0 0%, transparent 50%),
    radial-gradient(ellipse 90% 90% at 50% 100%, #c0d8ff 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 80% 60%, #d8f5e8 0%, transparent 50%),
    #f0f8f2;
  background-attachment: fixed;
  color: var(--ink);
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 200;
  backdrop-filter: blur(20px) saturate(1.6);
  background: rgba(255,255,255,0.55);
  border-bottom: 1.5px solid rgba(255,255,255,0.8);
  box-shadow: 0 2px 32px rgba(62,207,114,0.10);
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  padding: 0 2.5rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 72px; gap: 1rem;
}
.logo {
  font-family: 'Syne', Tahoma, Geneva, sans-serif;
  font-size: 2.2rem; font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #1a7a3a 0%, #b89000 50%, #1a4a9a 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; text-decoration: none; flex-shrink: 0;
}
.header-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
.nav-tab {
  padding: 7px 18px; border-radius: 99px; border: none; cursor: pointer;
  font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
  font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
  background: transparent; color: var(--muted);
}
.nav-tab.active {
  background: linear-gradient(135deg, #1a7a3a 0%, #1a4a9a 100%);
  color: #fff;
}
.nav-tab:hover:not(.active) { background: rgba(0,0,0,0.07); color: var(--ink); }
.header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

.flag-pills { display: flex; gap: 6px; }
.flag-pill { width: 28px; height: 8px; border-radius: 99px; }
.fp-g { background: var(--green); } .fp-y { background: var(--yellow); } .fp-b { background: var(--blue); }

/* ── HERO ── */
.hero-band { max-width: 1400px; margin: 0 auto; padding: 3.5rem 2.5rem 1.5rem; }
.hero-title {
  font-family: Tahoma, 'Tahoma', Geneva, sans-serif;
  font-size: clamp(2.8rem, 6vw, 5rem); font-weight: 800;
  line-height: 1.05; letter-spacing: -2px; color: var(--ink);
}
.hero-title em {
  font-style: normal;
  background: linear-gradient(90deg, #1a7a3a, #b89000, #1a4a9a);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero-sub { margin-top: 0.6rem; font-size: 1.25rem; font-weight: 300; color: var(--muted); }

/* ── MAIN ── */
.page { max-width: 1400px; margin: 0 auto; padding: 0 2.5rem 4rem; }

/* ── ARCHIVE TAB ── */
.archive-section { display: none; }
.archive-section.active { display: block; }
.today-section { display: block; }
.today-section.hidden { display: none; }

/* ── DATE PICKER BAR ── */
.date-bar {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 2rem; overflow-x: auto; padding-bottom: 8px;
}
.date-pill {
  padding: 8px 20px; border-radius: 99px; border: 1.5px solid rgba(255,255,255,0.8);
  background: var(--card-bg); backdrop-filter: blur(12px);
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  white-space: nowrap; transition: all 0.2s; color: var(--muted);
  flex-shrink: 0;
}
.date-pill.active {
  background: linear-gradient(135deg, var(--green-d), var(--blue-d));
  color: #fff; border-color: transparent;
}
.date-pill:hover:not(.active) { background: rgba(255,255,255,0.9); color: var(--ink); }
.archive-day { display: none; }
.archive-day.active { display: block; }

/* ── DETAIL VIEW ── */
#detail-view {
  display: none; margin-bottom: 2.5rem; border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 8px 60px rgba(26,74,154,0.13), 0 2px 12px rgba(0,0,0,0.06);
  animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn { from { opacity: 0; transform: scale(0.97) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.detail-header {
  background: linear-gradient(135deg, #0d2e15 0%, #0d1f3a 100%);
  padding: 2rem 2.5rem;
  display: grid; grid-template-columns: 180px 1fr auto;
  gap: 1.5rem; align-items: start;
}
.detail-img-wrap { width: 180px; height: 120px; border-radius: 12px; overflow: hidden; flex-shrink: 0; background: rgba(255,255,255,0.1); }
.detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.detail-headline {
  font-family: Tahoma, 'Tahoma', Geneva, sans-serif;
  font-size: clamp(1.5rem, 3vw, 2.1rem); font-weight: 800; line-height: 1.2;
  letter-spacing: -0.5px; color: #fff;
}
.detail-meta-tag {
  display: inline-block; margin-top: 0.6rem;
  font-family: Helvetica, 'Helvetica Neue', Arial, sans-serif;
  font-size: 1rem; color: rgba(255,255,255,0.55); font-weight: 300;
}
.detail-close {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.2);
  color: #fff; font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
.detail-close:hover { background: rgba(255,255,255,0.25); }
.detail-body { display: grid; grid-template-columns: 1fr 2px 1fr; background: var(--card-bg); backdrop-filter: blur(16px); }
.perspective { padding: 2rem 2.5rem; }
.persp-divider { background: linear-gradient(180deg, rgba(62,207,114,0.3), rgba(74,127,212,0.3)); margin: 1.5rem 0; }
.persp-label {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: Tahoma, 'Tahoma', Geneva, sans-serif;
  font-size: 0.85rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 99px; margin-bottom: 1rem;
}
.left-label  { background: #ffe0e0; color: #8a1a1a; border: 1.5px solid #ffb3b3; }
.right-label { background: #ddeeff; color: #0c2a5a; border: 1.5px solid #aaceff; }
.persp-summary { font-size: 1.08rem; line-height: 1.8; color: var(--ink); font-weight: 300; margin-bottom: 1.5rem; }
.sources-heading {
  font-size: 0.8rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.7rem; padding-bottom: 0.5rem;
  border-bottom: 1.5px solid rgba(0,0,0,0.07);
}
.source-row {
  display: flex; align-items: center; gap: 10px; padding: 7px 0;
  border-bottom: 1px solid rgba(0,0,0,0.05); text-decoration: none; color: inherit;
  transition: opacity 0.15s;
}
.source-row:last-child { border-bottom: none; }
.source-row:hover { opacity: 0.68; }
.source-badge {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: Tahoma, 'Tahoma', Geneva, sans-serif;
  font-size: 0.6rem; font-weight: 700; flex-shrink: 0;
}
.src-l { background: #ffe0e0; color: #8a1a1a; }
.src-r { background: #ddeeff; color: #0c2a5a; }
.source-text { flex: 1; min-width: 0; }
.source-name { font-size: 0.97rem; font-weight: 600; color: var(--ink); display: block; }
.source-title { font-size: 0.84rem; color: var(--muted); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
.source-arrow { font-size: 0.8rem; color: var(--muted); }

/* ── NEWS SECTION HEADER ── */
.news-section-header {
  display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem;
}
.news-section-title {
  font-family: Tahoma, 'Tahoma', Geneva, sans-serif;
  font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; color: var(--ink);
}
.news-count { font-size: 1rem; color: var(--muted); }

/* ── STATUS BANNER ── */
.status-banner {
  padding: 12px 20px; border-radius: 12px; margin-bottom: 1.5rem;
  font-size: 0.92rem; display: none;
}
.status-banner.info { background: #e8f4ff; color: #1a4a9a; border: 1.5px solid #aaceff; display: block; }
.status-banner.warn { background: #fff8e8; color: #7a5a00; border: 1.5px solid #ffe066; display: block; }
.status-banner.success { background: #e8f8ee; color: #1a5a30; border: 1.5px solid #b8f5d0; display: block; }
.status-banner.error { background: #ffe8e8; color: #8a1a1a; border: 1.5px solid #ffb3b3; display: block; }

/* ── NEWS GRID ── */
.news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.25rem; }
.news-card {
  background: var(--card-bg); backdrop-filter: blur(16px);
  border: 1.5px solid var(--card-border); border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
  box-shadow: 0 2px 16px rgba(26,74,154,0.06);
  animation: fadeUp 0.4s ease both;
}
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.news-card:hover { transform: translateY(-5px) scale(1.01); box-shadow: 0 12px 40px rgba(26,74,154,0.14); }
.news-card.active { border-color: var(--yellow); box-shadow: 0 0 0 3px rgba(255,224,102,0.4), 0 12px 40px rgba(26,74,154,0.14); }
.card-img { width: 100%; height: 180px; object-fit: cover; display: block; background: linear-gradient(135deg, #b8f5d0, #c2d9ff); }
.card-img-fallback { width: 100%; height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: linear-gradient(135deg, #d8f5e4, #ddeeff); }
.card-body { padding: 1.2rem 1.4rem 1.4rem; }
.card-tema {
  display: inline-block; font-family: Tahoma, Geneva, sans-serif;
  font-size: 0.78rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 99px; margin-bottom: 0.7rem;
}
.tema-política   { background: #fff5b8; color: #7a5a00; }
.tema-economia   { background: #d8f5e4; color: #1a5a30; }
.tema-segurança  { background: #ffe0e0; color: #7a1a1a; }
.tema-ambiente   { background: #d0f0e8; color: #0a4a38; }
.tema-saúde      { background: #ffe8f5; color: #7a0a50; }
.tema-esportes   { background: #ddeeff; color: #0c2a5a; }
.tema-cultura    { background: #f0e8ff; color: #3a0a7a; }
.tema-educação   { background: #fff0d8; color: #7a3a00; }
.tema-internacional { background: #e8f0ff; color: #0a2a6a; }
.tema-tecnologia { background: #f0f8ff; color: #0a3a6a; }
.card-headline {
  font-family: Tahoma, Geneva, sans-serif;
  font-size: 1.22rem; font-weight: 800; line-height: 1.25;
  letter-spacing: -0.3px; color: var(--ink); margin-bottom: 0.6rem;
}
.card-lide { font-size: 1rem; font-weight: 300; color: var(--muted); line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer {
  margin-top: 1rem; display: flex; align-items: center; justify-content: space-between;
  font-size: 0.85rem; color: var(--muted);
}
.card-cta {
  font-family: Tahoma, Geneva, sans-serif; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: linear-gradient(135deg, var(--green-p), var(--blue-p));
  color: var(--ink); padding: 5px 14px; border-radius: 99px;
  border: 1.5px solid rgba(255,255,255,0.8);
}

/* ── LOADING SPINNER ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
  border-top-color: #fff; border-radius: 50%;
  animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 4rem 2rem; color: var(--muted);
}
.empty-state .emoji { font-size: 3rem; margin-bottom: 1rem; }
.empty-state h3 { font-size: 1.4rem; font-family: Tahoma, Geneva, sans-serif; margin-bottom: 0.6rem; color: var(--ink); }
.empty-state p { font-size: 1rem; line-height: 1.6; max-width: 500px; margin: 0 auto 1.5rem; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .detail-header { grid-template-columns: 1fr auto; }
  .detail-img-wrap { display: none; }
  .detail-body { grid-template-columns: 1fr; }
  .persp-divider { height: 2px; width: auto; margin: 0 1.5rem; }
  .news-grid { grid-template-columns: 1fr; }
  .header-center { display: none; }
}
@media (max-width: 600px) {
  .header-inner { padding: 0 1.2rem; }
  .hero-band, .page { padding-left: 1.2rem; padding-right: 1.2rem; }
  .detail-header { padding: 1.2rem 1.4rem; }
  .perspective { padding: 1.4rem; }
  .logo { font-size: 1.7rem; }
}
</style>
</head>

<header>
  <div class="header-inner">
    <a href="#" class="logo" onclick="return false;">DoisLados</a>
    <div class="header-center">
      <button class="nav-tab active" onclick="showTab('hoje')">📰 Hoje</button>

        <div class="sources-heading">Fontes conservadoras</div>
        <div id="right-sources"></div>

    </div>
  </div>

  <!-- TODAY TAB -->
  <div class="today-section" id="today-section">

      <div class="news-section-title">Hoje — <span id="today-date-label"></span></div>
      <span class="news-count" id="news-count-label"></span>
    </div>
    <div id="status-banner" class="status-banner"></div>

  <!-- ARCHIVE TAB -->

    <div id="archive-days"></div>
  </div>

</div><!-- /page -->

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  NEWS_DATA = PRELOADED_TODAY;
  ARCHIVE_DATA = PRELOADED_ARCHIVE;
  updateTodayLabel();
  renderGrid();
  renderArchive();
});

function updateTodayLabel() {
  const hoje = new Date();
  const opts = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
  document.getElementById('today-date-label').textContent = hoje.toLocaleDateString('pt-BR', opts);
  document.getElementById('news-count-label').textContent = NEWS_DATA.length + ' notícias';
}

function showTab(tab) {
  currentTab = tab;
  closeDetail();
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'hoje') {
    document.getElementById('today-section').classList.remove('hidden');
    document.getElementById('archive-section').classList.remove('active');
  } else {
    document.getElementById('today-section').classList.add('hidden');
    document.getElementById('archive-section').classList.add('active');
  }
}

function showBanner(type, msg) {
  const b = document.getElementById('status-banner');
  b.className = 'status-banner ' + type;
  b.textContent = msg;
  if (type === 'success' || type === 'info') setTimeout(() => { b.className = 'status-banner'; }, 6000);
}

// ── REFRESH COM CLAUDE API + WEB SEARCH ──
function renderGrid() {
  const grid = document.getElementById('news-grid');
  grid.innerHTML = '';
  if (!NEWS_DATA.length) {
    grid.innerHTML = '<div class="empty-state"><div class="emoji">📰</div><h3>Sem notícias carregadas</h3><p>Sem notícias disponíveis.</p></div>';
    return;
  }
  NEWS_DATA.forEach((a, i) => {
    const card = document.createElement('div');
    card.className = 'news-card' + (selectedCard === i ? ' active' : '');
    card.style.animationDelay = (i * 0.04) + 's';
    const emoji = TEMA_EMOJIS[a.tema] || '📰';
    card.innerHTML = `
      <img class="card-img" src="${a.img}" alt="${a.tema}"
        onerror="this.outerHTML='<div class=card-img-fallback>${emoji}</div>'">
      <div class="card-body">
        <span class="card-tema tema-${a.tema}">${a.tema}</span>
        <div class="card-headline">${a.headline}</div>
        <div class="card-lide">${a.lide}</div>
        <div class="card-footer">
          <span>📅 ${a.data}</span>
          <span class="card-cta">Ver dois lados →</span>
        </div>
      </div>`;
    card.onclick = () => openDetail(i, NEWS_DATA);
    grid.appendChild(card);
  });
}

// ── RENDER ARCHIVE ──
function renderArchive() {
  const dateBar = document.getElementById('date-bar');
  const daysContainer = document.getElementById('archive-days');
  dateBar.innerHTML = '';
  daysContainer.innerHTML = '';
  const dates = Object.keys(ARCHIVE_DATA).sort((a, b) => {
    const parse = d => { const [dd,mm,yyyy] = d.split('/'); return new Date(+yyyy,+mm-1,+dd); };
    return parse(b) - parse(a);
  });
  if (!dates.length) {
    daysContainer.innerHTML = '<div class="empty-state"><div class="emoji">📅</div><h3>Arquivo vazio</h3><p>O arquivo da semana está vazio.</p></div>';
    return;
  }
  dates.forEach((date, idx) => {
    // Date pill
    const pill = document.createElement('button');
    pill.className = 'date-pill' + (idx === 0 ? ' active' : '');
    pill.textContent = date;
    pill.onclick = () => {
      document.querySelectorAll('.date-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      document.querySelectorAll('.archive-day').forEach(d => d.classList.remove('active'));
      document.getElementById('day-' + date.replace(/\//g,'-')).classList.add('active');
      closeDetail();
    };
    dateBar.appendChild(pill);

    // Day grid
    const dayDiv = document.createElement('div');
    dayDiv.className = 'archive-day' + (idx === 0 ? ' active' : '');
    dayDiv.id = 'day-' + date.replace(/\//g,'-');
    
    const articles = ARCHIVE_DATA[date];
    const header = document.createElement('div');
    header.className = 'news-section-header';
    header.innerHTML = `<div class="news-section-title" style="font-size:1.5rem">${date}</div><span class="news-count">${articles.length} notícias</span>`;
    dayDiv.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'news-grid';
    articles.forEach((a, i) => {
      const card = document.createElement('div');
      card.className = 'news-card';
      card.style.animationDelay = (i * 0.04) + 's';
      const emoji = TEMA_EMOJIS[a.tema] || '📰';
      card.innerHTML = `
        <img class="card-img" src="${a.img}" alt="${a.tema}"
          onerror="this.outerHTML='<div class=card-img-fallback>${emoji}</div>'">
        <div class="card-body">
          <span class="card-tema tema-${a.tema}">${a.tema}</span>
          <div class="card-headline">${a.headline}</div>
          <div class="card-lide">${a.lide}</div>
          <div class="card-footer">
            <span>📅 ${a.data}</span>
            <span class="card-cta">Ver dois lados →</span>
          </div>
        </div>`;
      card.onclick = () => openDetail(i, articles);
      grid.appendChild(card);
    });
    dayDiv.appendChild(grid);
    daysContainer.appendChild(dayDiv);
  });
}

// ── DETAIL ──
let _currentDataset = null;
function openDetail(i, dataset) {
  _currentDataset = dataset;
  selectedCard = i;
  if (dataset === NEWS_DATA) renderGrid();
  const a = dataset[i];
  const dv = document.getElementById('detail-view');
  dv.style.display = 'block';
  dv.scrollIntoView({ behavior: 'smooth', block: 'start' });
  const emoji = TEMA_EMOJIS[a.tema] || '📰';
  document.getElementById('detail-img-wrap').innerHTML = `<img src="${a.img}" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:12px" alt="${a.tema}" onerror="this.outerHTML='<div style=width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem>${emoji}</div>'">`;
  document.getElementById('detail-headline').textContent = a.headline;
  document.getElementById('detail-meta').textContent = a.fonte_principal + ' · ' + a.data;
  document.getElementById('left-summary').textContent = a.left_summary;
  document.getElementById('right-summary').textContent = a.right_summary;
  renderSources('left-sources', a.left_sources, 'src-l');
  renderSources('right-sources', a.right_sources, 'src-r');
}

function closeDetail() {
  selectedCard = null;
  document.getElementById('detail-view').style.display = 'none';
  if (_currentDataset === NEWS_DATA) renderGrid();
}

function renderSources(id, sources, cls) {
  const el = document.getElementById(id);
  el.innerHTML = (sources || []).map(s => {
    const abbr = (s.name || '?').split(/\s+/).map(w => w[0]).join('').slice(0, 2).toUpperCase();
    const hasUrl = s.url && s.url.startsWith('http');
    const tag = hasUrl ? 'a' : 'div';
    const href = hasUrl ? `href="${s.url}" target="_blank" rel="noopener"` : '';
    return `<${tag} class="source-row" ${href}>
      <div class="source-badge ${cls}">${abbr}</div>
      <div class="source-text">
        <span class="source-name">${s.name}</span>
        <span class="source-title">${s.title || ''}</span>
      </div>
      ${hasUrl ? '<span class="source-arrow">↗</span>' : ''}
    </${tag}>`;
  }).join('');
}
